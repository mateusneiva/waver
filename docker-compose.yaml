services:
  web:
    container_name: web
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    restart: unless-stopped
    env_file: ./apps/web/.env
    ports:
      - "4000:4000"


  discord-bot:
    container_name: discord-bot
    build:
      context: .
      dockerfile: ./apps/discord-bot/Dockerfile
    restart: unless-stopped
    env_file: ./apps/discord-bot/.env

  docs:
    container_name: docs
    build:
      context: .
      dockerfile: ./apps/docs/Dockerfile
    restart: unless-stopped
    ports:
      - "4001:4001"

  status:
    container_name: status
    build:
      context: .
      dockerfile: ./apps/status/Dockerfile
    restart: unless-stopped
    env_file: ./apps/status/.env

